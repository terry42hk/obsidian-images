<svg width="820" height="220" viewBox="0 0 820 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 - 深色网络主题 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </linearGradient>
    
    <!-- 主色调渐变（青绿色） -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    
    <!-- 光晕效果 -->
    <radialGradient id="glowGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="820" height="220" fill="url(#bgGradient)"/>
  
  <!-- 装饰光晕 -->
  <circle cx="120" cy="110" r="180" fill="url(#glowGradient)" opacity="0.4"/>
  <circle cx="700" cy="110" r="150" fill="url(#glowGradient)" opacity="0.3"/>
  
  <!-- 背景网格 -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="1" fill="none">
    <line x1="0" y1="55" x2="820" y2="55"/>
    <line x1="0" y1="110" x2="820" y2="110"/>
    <line x1="0" y1="165" x2="820" y2="165"/>
    <line x1="205" y1="0" x2="205" y2="220"/>
    <line x1="410" y1="0" x2="410" y2="220"/>
    <line x1="615" y1="0" x2="615" y2="220"/>
  </g>
  
  <!-- Logo 区域 - 路由器图标 -->
  <g transform="translate(40, 60)">
    <!-- 外圈 -->
    <circle cx="25" cy="25" r="25" fill="url(#accentGradient)" opacity="0.15"/>
    <circle cx="25" cy="25" r="20" fill="none" stroke="url(#accentGradient)" stroke-width="2"/>
    
    <!-- 路由器核心 -->
    <circle cx="25" cy="25" r="7" fill="url(#accentGradient)" filter="url(#glow)"/>
    
    <!-- 信号波纹 -->
    <circle cx="25" cy="25" r="12" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <circle cx="25" cy="25" r="16" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    
    <!-- 连接点 -->
    <circle cx="6" cy="25" r="2.5" fill="#8b5cf6"/>
    <circle cx="44" cy="25" r="2.5" fill="#8b5cf6"/>
    <circle cx="25" cy="6" r="2.5" fill="#06b6d4"/>
    <circle cx="25" cy="44" r="2.5" fill="#06b6d4"/>
    
    <!-- 连接线 -->
    <line x1="8.5" y1="25" x2="18" y2="25" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="32" y1="25" x2="41.5" y2="25" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="25" y1="8.5" x2="25" y2="18" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <line x1="25" y1="32" x2="25" y2="41.5" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- 品牌名称和主文案 -->
  <g transform="translate(115, 0)">
    <text x="0" y="85" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" 
          font-size="24" font-weight="700" fill="url(#accentGradient)" letter-spacing="0.5">
      AnyRouter
    </text>
    
    <text x="0" y="115" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="26" font-weight="bold" fill="#ffffff" letter-spacing="0.5">
      一条 AnyRouter，让世界连成网
    </text>
    
    <text x="0" y="142" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="13" fill="#94a3b8" letter-spacing="0.3">
      支持多协议路由、节点智能分发，免费 CloudCode API Token
    </text>
  </g>
  
  <!-- 特性标签 -->
  <g transform="translate(115, 162)">
    <!-- 标签1 - 免费 API -->
    <rect x="0" y="0" width="75" height="24" rx="12" fill="#10b981" opacity="0.2"/>
    <rect x="0" y="0" width="75" height="24" rx="12" fill="none" stroke="#10b981" stroke-width="1"/>
    <text x="37.5" y="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">免费 API</text>
    
    <!-- 标签2 - 多协议 -->
    <rect x="85" y="0" width="75" height="24" rx="12" fill="#06b6d4" opacity="0.2"/>
    <rect x="85" y="0" width="75" height="24" rx="12" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <text x="122.5" y="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="11" font-weight="600" fill="#22d3ee" text-anchor="middle">多协议</text>
    
    <!-- 标签3 - 开源 -->
    <rect x="170" y="0" width="60" height="24" rx="12" fill="#8b5cf6" opacity="0.2"/>
    <rect x="170" y="0" width="60" height="24" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <text x="200" y="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">开源</text>
  </g>
  
  <!-- 右侧全球网络图示 -->
  <g transform="translate(650, 110)" opacity="0.5">
    <!-- 简化的地球轮廓 -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="65" ry="22" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.25"/>
    <ellipse cx="0" cy="0" rx="22" ry="65" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.25"/>
    
    <!-- 网络节点 -->
    <g fill="#10b981" filter="url(#glow)">
      <circle cx="-32" cy="-27" r="3"/>
      <circle cx="11" cy="-33" r="3"/>
      <circle cx="38" cy="-16" r="3.5"/>
      <circle cx="-22" cy="33" r="2.5"/>
      <circle cx="5" cy="22" r="2.5"/>
      <circle cx="43" cy="27" r="2.5"/>
    </g>
    
    <!-- 连接线 -->
    <g stroke="url(#accentGradient)" stroke-width="1" fill="none" opacity="0.6">
      <path d="M -32,-27 Q 0,-40 38,-16" stroke-dasharray="3,3"/>
      <path d="M 11,-33 Q 25,-22 38,-16" stroke-dasharray="3,3"/>
      <path d="M -32,-27 Q -27,0 -22,33" stroke-dasharray="3,3"/>
      <path d="M 38,-16 Q 41,5 43,27" stroke-dasharray="3,3"/>
    </g>
  </g>
  
  <!-- CTA 按钮 -->
  <g transform="translate(680, 165)">
    <rect x="0" y="0" width="110" height="36" rx="18" fill="url(#accentGradient)"/>
    <rect x="0" y="0" width="110" height="36" rx="18" fill="none" 
          stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <text x="55" y="23" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">
      免费开始
    </text>
  </g>
  
  <!-- 装饰元素 -->
  <g opacity="0.1" fill="#06b6d4">
    <polygon points="25,210 40,210 32.5,195"/>
    <polygon points="795,10 810,10 802.5,25"/>
    <circle cx="770" cy="200" r="2"/>
  </g>
</svg>
